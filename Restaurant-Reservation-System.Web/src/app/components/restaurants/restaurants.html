<section class="choose-section" id="choose">
  <div class="section-head reveal">
    <div class="section-label">Best Restaurants In Georgia</div>
    <h2 class="section-title">Where would you like<br>to <em>dine tonight?</em></h2>
  </div>
  <div class="restaurants-grid" id="restaurantsGrid">
    <div  *ngFor="let restaurant of restaurants; let i = index">
      <app-restaurant
        [name]="restaurant.name"
        [location]="restaurant.location"
        [description]="restaurant.description"
      ></app-restaurant>
    </div>
  </div>
</section>

<div class="gold-line"></div>
