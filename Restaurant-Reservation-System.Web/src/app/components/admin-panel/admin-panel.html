<div class="admin-layout">
  <header class="mobile-top-bar">
    <span class="brand-name">{{ globals.appName }}</span>
    <button class="menu-toggle" (click)="toggleSidebar()">
      {{ isSidebarOpen() ? '✕' : '☰' }}
    </button>
  </header>

  <div class="sidebar-overlay" 
       [class.active]="isSidebarOpen()" 
       (click)="toggleSidebar()"></div>

  <aside class="sidebar" [class.open]="isSidebarOpen()">
    <div class="sidebar-brand">
      <span class="brand-name">{{ globals.appName }}</span>
      <span class="brand-sub">ADMIN PANEL</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">GENERAL</div>
      <a routerLink="/home" routerLinkActive="active" class="nav-item">
        ⌂ Home
      </a>

      <div class="nav-section-label">PEOPLE</div>
      <a routerLink="users" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'users'}" (click)="switchShow('users')">
        ○ Users
      </a>
       <!-- <a routerLink="schedules" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'schedules'}" (click)="switchShow('schedules')">
        🗓 Schedules
      </a> -->

      <div class="nav-section-label">DINING</div>
      <a routerLink="restaurants" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'restaurants'}" (click)="switchShow('restaurants')">
        ◈ Restaurants
      </a>
      <a routerLink="menus" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'menus'}" (click)="switchShow('menus')">
        ◍ Menus
      </a>

      <div class="nav-section-label">BOOKINGS</div>
      <a routerLink="reservations" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'reservations'}" (click)="switchShow('reservations')">
        ◷ Reservations
      </a>

       <div class="nav-section-label">SETTINGS</div>
      <a routerLink="email-js" routerLinkActive="active" class="nav-item"
        [ngClass]="{'nav-button-pressed': show() === 'email-js'}" (click)="switchShow('email-js')">
        ✉ EmailJS
      </a>
    </nav>

    <!-- <div class="sidebar-footer">
      <div class="admin-avatar">A</div>
      <div class="admin-info">
        <div class="admin-name">Administrator</div>
        <div class="admin-role">Super Admin</div>
      </div>
    </div> -->
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
