<div class="auth-overlay open">
  <div class="auth-box">

    <div class="auth-top">
      <h2 class="auth-title">Create an <em>account</em></h2>
      <p class="auth-sub">Join free to reserve at any of our restaurants.</p>
    </div>

    <div class="auth-form-wrap">

      <div class="auth-panel active">
        <div class="auth-error" id="registerError"></div>

        <div class="afield">
          <div class="afield-row">
            <div>
              <label>First Name</label>
              <input type="text" placeholder="Jean">
            </div>
            <div>
              <label>Last Name</label>
              <input type="text" placeholder="Dupont">
            </div>
          </div>
        </div>

        <div class="afield">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com">
        </div>

        <div class="afield">
          <label>Password</label>
          <input type="password" placeholder="At least 6 characters">
        </div>

        <div class="afield">
          <label>Confirm Password</label>
          <input type="password" placeholder="••••••••">
        </div>

        <button class="auth-btn">Create Account</button>

        <div class="auth-switch">
          Already have an account? <a routerLink="/login">Sign in</a>
        </div>
      </div>

    </div>
  </div>
</div>
