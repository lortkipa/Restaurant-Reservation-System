<form class="auth-overlay open" #myForm="ngForm" (ngSubmit)="onSubmit(myForm)">
  <div class="auth-box">

    <div class="auth-top">
      <h2 class="auth-title">Welcome <em>back</em></h2>
      <p class="auth-sub">Sign in to manage your reservations.</p>
    </div>

    <div class="auth-form-wrap">

      <div class="auth-panel active">
        <div class="auth-error" id="loginError"></div>

        <div class="afield">
          <label>Username</label>
          <input type="text" placeholder="nikoloz123b">
        </div>

        <div class="afield">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>

        <button class="auth-btn" type="submit">Sign In</button>

        <div class="auth-switch">
          Don't have an account? <a routerLink="/register">Create one</a>
        </div>
      </div>

    </div>
  </div>
</form>
