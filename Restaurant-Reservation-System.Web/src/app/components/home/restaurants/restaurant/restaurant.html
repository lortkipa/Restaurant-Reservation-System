<div class="restaurant-card" onclick="selectRestaurant(5)" data-id="5">
      <div class="card-check">✓</div>
      <!-- <div class="card-cuisine">Mediterranean</div> -->
      <div class="card-name">{{name}}</div>
      <div class="card-location">{{location}}</div>
      <div class="card-divider"></div>
      <div class="card-desc">{{description}}</div>
      <!-- <div class="card-meta"><div class="card-stars">★</div><div class="card-price">$$</div></div> -->
      <button class="card-btn" [routerLink]="'/menu'" [queryParams]="{ restaurantId: id }">See Menu</button>
</div>
